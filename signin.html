<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>ล็อกอิน · ระบบงานแผน วก.แม่สะเรียง</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="logo-msr.png">
<link rel="apple-touch-icon" href="logo-msr.png">
<link rel="stylesheet" href="styles.css">
<script>
  window.__GAS_URL__ = 'https://script.google.com/macros/s/AKfycbzqNFleiDVWfMcwQbsDBCvYOZtnujCluR1Gl9iCWmx-J6DS84HpFMGXHfKgphH49hRLLQ/exec';
</script>
<script src="js/security.js"></script>
<script src="js/api.js"></script>
<style>
  body {
    margin: 0;
    background: linear-gradient(135deg, var(--navy-700) 0%, var(--navy-500) 100%);
    display: grid;
    place-items: center;
    min-height: 100vh;
    font-family: 'Sarabun', system-ui, sans-serif;
  }
  
  .login-container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }
  
  .login-card {
    background: white;
    border-radius: 16px;
    padding: 48px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
    text-align: center;
  }
  
  .logo-circle {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: white;
    display: grid;
    place-items: center;
    margin: 0 auto 20px;
    border: 3px solid var(--gold-500);
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(20,40,80,.15);
  }

  .logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  
  .login-card h1 {
    margin: 0 0 8px;
    font-size: 24px;
    font-weight: 800;
    color: var(--ink-900);
    letter-spacing: -0.01em;
  }
  
  .login-card .subtitle {
    color: var(--ink-500);
    font-size: 14px;
    margin: 0 0 32px;
  }
  
  .form-group {
    text-align: left;
    margin-bottom: 18px;
  }
  
  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--ink-500);
    text-transform: uppercase;
    letter-spacing: .08em;
    font-weight: 600;
    margin-bottom: 8px;
  }
  
  .form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--ink-200);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    box-sizing: border-box;
    transition: all .2s;
  }
  
  .form-group input:focus {
    outline: none;
    border-color: var(--navy-700);
    box-shadow: 0 0 0 3px rgba(20, 40, 80, .1);
  }
  
  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--navy-700);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    margin-top: 8px;
  }
  
  .btn-login:hover {
    background: var(--navy-600);
    box-shadow: 0 4px 12px rgba(20, 40, 80, .3);
  }
  
  .btn-login:active {
    transform: translateY(1px);
  }
  
  .divider {
    display: flex;
    align-items: center;
    margin: 24px 0;
  }
  
  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--ink-200);
  }
  
  .divider span {
    padding: 0 12px;
    color: var(--ink-500);
    font-size: 12px;
  }
  
  .btn-google {
    width: 100%;
    padding: 12px;
    background: white;
    color: var(--ink-900);
    border: 1px solid var(--ink-200);
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all .2s;
  }
  
  .btn-google:hover {
    background: var(--ink-50);
    border-color: var(--ink-300);
  }
  
  .btn-google::before {
    content: '🔐';
    font-size: 18px;
  }
  
  .remember-me {
    display: flex;
    align-items: center;
    margin: 16px 0;
    font-size: 13px;
    color: var(--ink-700);
  }
  
  .remember-me input {
    margin-right: 8px;
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
  
  .footer-links {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    gap: 16px;
    font-size: 12px;
  }
  
  .footer-links a {
    color: var(--ink-500);
    text-decoration: none;
    transition: color .2s;
  }
  
  .footer-links a:hover {
    color: var(--navy-700);
  }
  
  .alert-message {
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  
  .alert-message.error {
    background: #fee2e2;
    color: var(--rose-600);
    border: 1px solid #fca5a5;
  }
  
  .alert-message.warning {
    background: #fef3c7;
    color: var(--amber-600);
    border: 1px solid #fde68a;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="logo-circle">
      <img src="logo-msr.png" alt="วิทยาลัยการอาชีพแม่สะเรียง">
    </div>
    
    <h1>ล็อกอิน</h1>
    <p class="subtitle">ระบบงานแผนและงบประมาณ</p>
    
    <div id="alert-container"></div>
    
    <form id="login-form">
      <div class="form-group">
        <label for="email">อีเมล</label>
        <input type="email" id="email" placeholder="your.name@msc.ac.th" required>
      </div>
      
      <div class="form-group">
        <label for="password">รหัสผ่าน</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      
      <div class="remember-me">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember" style="margin: 0; cursor: pointer;">จำรหัสผ่านไว้ครั้งต่อไป</label>
      </div>
      
      <button type="submit" class="btn-login">ล็อกอิน</button>
    </form>
    
    <div class="divider"><span>หรือ</span></div>
    
    <button type="button" class="btn-google" onclick="googleLogin(); return false;">
      ล็อกอินด้วย Google
    </button>
    
    <div class="footer-links">
      <a href="#" onclick="alert('ติดต่อผู้ดูแลระบบ'); return false;">ลืมรหัสผ่าน?</a>
      <span>•</span>
      <a href="#" onclick="alert('ติดต่อผู้ดูแลระบบ'); return false;">ช่วยเหลือ</a>
    </div>
  </div>
  
  <div style="text-align: center; margin-top: 32px; color: white; font-size: 12px;">
    <p style="margin: 0;">ระบบนี้สำหรับบุคลากร วิทยาลัยการอาชีพแม่สะเรียง เท่านั้น</p>
    <p style="margin: 8px 0 0; opacity: .8;">ปีงบประมาณ 2569</p>
  </div>
</div>

<script>
const loginForm = document.getElementById('login-form');
const loginBtn  = loginForm.querySelector('button[type="submit"]');

loginForm.addEventListener('submit', async function(e) {
  e.preventDefault();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showAlert('กรุณากรอก Email และรหัสผ่าน', 'warning');
    return;
  }

  // Loading state
  loginBtn.textContent = 'กำลังเข้าสู่ระบบ...';
  loginBtn.disabled = true;

  try {
    const r = await API.auth.login(email, password);

    if (r.ok) {
      window.location.href = 'app.html';
    } else {
      const msg = {
        'INVALID_CREDENTIALS': 'Email หรือรหัสผ่านไม่ถูกต้อง',
        'ACCOUNT_INACTIVE':    'บัญชีนี้ถูกระงับการใช้งาน กรุณาติดต่อผู้ดูแลระบบ',
        'MOCK_NOT_FOUND':      'ไม่พบบัญชีผู้ใช้ (Demo mode)'
      }[r.error] || (r.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่');
      showAlert(msg, 'error');
    }
  } catch (err) {
    showAlert('ไม่สามารถเชื่อมต่อระบบได้ กรุณาตรวจสอบอินเทอร์เน็ต', 'error');
  } finally {
    loginBtn.textContent = 'ล็อกอิน';
    loginBtn.disabled = false;
  }
});

function googleLogin() {
  showAlert('Google Login ยังไม่เปิดใช้งาน กรุณาล็อกอินด้วย Email', 'warning');
}

function showAlert(message, type) {
  const alertContainer = document.getElementById('alert-container');
  alertContainer.innerHTML = `<div class="alert-message ${type}">${message}</div>`;
  setTimeout(() => { alertContainer.innerHTML = ''; }, 6000);
}

// แสดงเตือนถ้าถูก redirect มาเพราะตรวจพบการ tamper
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('tampered') === '1') {
    setTimeout(() => showAlert(
      '⚠️ ตรวจพบการแก้ไขข้อมูลเซสชัน — ระบบบังคับออกจากระบบเพื่อความปลอดภัย',
      'error'
    ), 200);
  }
})();

// ถ้า login อยู่แล้ว และ session ไม่ถูก tamper → ไปหน้า app ทันที
window.addEventListener('load', function() {
  const u = localStorage.getItem('plan_user');
  const t = localStorage.getItem('plan_token');
  if (u && t && typeof Security !== 'undefined' && Security.verify()) {
    window.location.href = 'app.html';
  }
});
</script>

</body>
</html>
