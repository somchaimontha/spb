<style>
  body { background: #e9ecef; }

    font-size: 14px;
    color: var(--ink-900);
  }
  .sidebar {

  .stat .val { font-size: 24px; font-weight: 800; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .stat .delta { font-size: 11.5px; margin-top: 4px; color: var(--ink-500); }
  .stat .delta.up { color: var(--green-600); }

  .tl-step .dot { width: 24px; height: 24px; border-radius: 50%; background: var(--ink-200); display: grid; place-items: center; font-size: 12px; font-weight: 700; color: var(--ink-500); }

  .tl-step .body { font-size: 12.5px; }
  .tl-step .who { color: var(--ink-500); font-size: 11px; }
  .tl-step .when { color: var(--ink-500); font-size: 11px; margin-top: 2px; }

  .signin {

  .dc-artboard { background: #e9ecef; }
</style>
</head>
