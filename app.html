<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>ระบบงานแผน · วก.แม่สะเรียง</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
<style>
  body { margin: 0; display: flex; min-height: 100vh; background: var(--paper); }
  
  .app-frame {
    display: grid;
    grid-template-columns: 240px 1fr;
    width: 100%;
    min-height: 100vh;
  }
  
  .sidebar {
    background: var(--navy-700);
    color: #cbd5e1;
    display: flex;
    flex-direction: column;
    padding: 20px 14px;
    border-right: 1px solid rgba(0,0,0,.1);
    overflow-y: auto;
    box-shadow: 2px 0 8px rgba(0,0,0,.08);
  }
  
  .sb-brand {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 28px;
  }
  
  .sb-brand .logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--gold-500);
    color: var(--navy-700);
    display: grid;
    place-items: center;
    font-weight: 800;
    font-size: 16px;
    flex-shrink: 0;
  }
  
  .sb-brand .info {
    flex: 1;
    min-width: 0;
  }
  
  .sb-brand .name {
    color: white;
    font-weight: 700;
    font-size: 14px;
    line-height: 1.2;
  }
  
  .sb-brand .sub {
    font-size: 11px;
    color: rgba(255,255,255,.55);
    line-height: 1.2;
  }
  
  .sb-section {
    font-size: 10.5px;
    letter-spacing: .14em;
    color: rgba(255,255,255,.4);
    text-transform: uppercase;
    margin: 18px 8px 8px;
    font-weight: 600;
  }
  
  .sb-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
  }
  
  .sb-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #cbd5e1;
    transition: all .2s ease;
    text-decoration: none;
    border-left: 3px solid transparent;
  }
  
  .sb-item:hover {
    background: rgba(255,255,255,.08);
    color: white;
  }
  
  .sb-item.active {
    background: rgba(255,255,255,.12);
    color: white;
    border-left-color: var(--gold-500);
    padding-left: 9px;
  }
  
  .sb-item .ic {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    opacity: .7;
  }
  
  .sb-spacer {
    flex: 1;
  }
  
  .sb-user {
    border-top: 1px solid rgba(255,255,255,.08);
    padding-top: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  
  .sb-user .av {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--gold-500);
    color: var(--navy-700);
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  
  .sb-user .info {
    flex: 1;
    min-width: 0;
  }
  
  .sb-user .nm {
    color: white;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.2;
  }
  
  .sb-user .rl {
    font-size: 10.5px;
    color: rgba(255,255,255,.5);
    line-height: 1.2;
  }
  
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .topbar {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--ink-100);
    background: white;
    gap: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  
  .topbar .breadcrumb {
    font-size: 12px;
    color: var(--ink-500);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  
  .topbar .breadcrumb span {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  
  .topbar .breadcrumb span::before {
    content: '/';
    color: var(--ink-300);
  }
  
  .topbar .breadcrumb span:first-child::before {
    content: none;
  }
  
  .topbar h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink-900);
  }
  
  .topbar .grow {
    flex: 1;
  }
  
  .content {
    flex: 1;
    padding: 28px 32px;
    overflow-y: auto;
    background: var(--paper);
  }
  
  /* Scrollbar styling */
  .sidebar::-webkit-scrollbar,
  .content::-webkit-scrollbar {
    width: 6px;
  }
  
  .sidebar::-webkit-scrollbar-track,
  .content::-webkit-scrollbar-track {
    background: transparent;
  }
  
  .sidebar::-webkit-scrollbar-thumb,
  .content::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,.2);
    border-radius: 3px;
  }
  
  .sidebar::-webkit-scrollbar-thumb:hover,
  .content::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,.3);
  }
</style>
</head>
<body>

<div class="app-frame">
  
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="logo">วก</div>
      <div class="info">
        <div class="name">แผนและงบ</div>
        <div class="sub">วก.แม่สะเรียง</div>
      </div>
    </div>
    
    <div class="sb-section">หลัก</div>
    <nav class="sb-nav">
      <a href="#" class="sb-item active" data-page="dashboard">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <a href="#" class="sb-item" data-page="projects">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>โครงการ</span>
      </a>
    </nav>
    
    <div class="sb-section">การบริหาร</div>
    <nav class="sb-nav">
      <a href="#" class="sb-item" data-page="budget">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="11" width="20" height="2"/><path d="M2 4h20v16a2 2 0 01-2 2H4a2 2 0 01-2-2V4z"/>
        </svg>
        <span>บัญชีคุมงบ</span>
      </a>
      <a href="#" class="sb-item" data-page="disbursement">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="12 1 12 23M17.2 4.2a2 2 0 010 2.83l-5.39 5.39a1 1 0 01-1.42 0L4.8 7a2 2 0 112.83-2.83l1.13 1.13 1.13-1.13a2 2 0 012.83 0z"/>
        </svg>
        <span>ขอเบิก</span>
      </a>
      <a href="#" class="sb-item" data-page="approval">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/>
        </svg>
        <span>อนุมัติ</span>
      </a>
    </nav>
    
    <div class="sb-section">อื่นๆ</div>
    <nav class="sb-nav">
      <a href="#" class="sb-item" data-page="reports">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>รายงาน</span>
      </a>
    </nav>
    
    <div class="sb-spacer"></div>
    
    <div class="sb-user">
      <div class="av">ใ</div>
      <div class="info">
        <div class="nm">ใจจริง ใจ</div>
        <div class="rl">Staff</div>
      </div>
    </div>
  </aside>
  
  <!-- Main content -->
  <div class="main">
    <header class="topbar">
      <div class="breadcrumb">
        <span>หน้าแรก</span>
        <span id="topbar-title">Dashboard</span>
      </div>
      <div class="grow"></div>
      <button class="btn sm ghost" onclick="logout(); return false;">ออกจากระบบ</button>
    </header>
    <div class="content" id="app-content">
      <!-- Content loaded here -->
    </div>
  </div>
  
</div>

<script>
// Authentication check
function checkAuth() {
  const user = localStorage.getItem('user');
  if (!user) {
    window.location.href = 'signin.html';
    return null;
  }
  return JSON.parse(user);
}

function logout() {
  if (confirm('คุณแน่ใจหรือว่าต้องการออกจากระบบ?')) {
    localStorage.removeItem('user');
    window.location.href = 'signin.html';
  }
}

// Initialize user info
const currentUser = checkAuth();
if (currentUser) {
  document.querySelector('.sb-user .av').textContent = currentUser.name.charAt(0);
  document.querySelector('.sb-user .nm').textContent = currentUser.name;
}

// Simple page routing
const pages = {
  dashboard: 'pages/dashboard.html',
  projects: 'pages/projects.html',
  budget: 'pages/budget.html',
  disbursement: 'pages/disbursement.html',
  approval: 'pages/approval.html',
  reports: 'pages/reports.html'
};

const labels = {
  dashboard: 'Dashboard',
  projects: 'ทะเบียนโครงการ',
  budget: 'บัญชีคุมงบ',
  disbursement: 'ขอเบิก',
  approval: 'กล่องอนุมัติ',
  reports: 'รายงาน'
};

const contentDiv = document.getElementById('app-content');
const sidebarItems = document.querySelectorAll('.sb-item');
const topbarTitle = document.getElementById('topbar-title');

function loadPage(pageName) {
  const url = pages[pageName];
  if (!url) return;
  
  fetch(url)
    .then(r => r.text())
    .then(html => {
      contentDiv.innerHTML = html;
      topbarTitle.textContent = labels[pageName];
      
      // Update sidebar active state
      sidebarItems.forEach(item => item.classList.remove('active'));
      document.querySelector(`[data-page="${pageName}"]`).classList.add('active');
    })
    .catch(e => {
      contentDiv.innerHTML = `<div class="callout rose"><strong>Error:</strong> ไม่สามารถโหลดหน้านี้ได้</div>`;
    });
}

// Navigation handler
sidebarItems.forEach(item => {
  item.addEventListener('click', (e) => {
    e.preventDefault();
    const pageName = item.dataset.page;
    loadPage(pageName);
  });
});

// Load dashboard on page load
loadPage('dashboard');
</script>

</body>
</html>
