  window.__GAS_URL__ = 'https://script.google.com/macros/s/AKfycbzqNFleiDVWfMcwQbsDBCvYOZtnujCluR1Gl9iCWmx-J6DS84HpFMGXHfKgphH49hRLLQ/exec';

<style>
  body { margin: 0; display: flex; min-height: 100vh; background: var(--paper); }
  
  .app-frame {
    display: grid;
    grid-template-columns: 240px 1fr;
    width: 100%;
    min-height: 100vh;
  }
  
  .sidebar {
    background: var(--navy-700);
    color: #cbd5e1;
    display: flex;
    flex-direction: column;
    padding: 20px 14px;
    border-right: 1px solid rgba(0,0,0,.1);
    overflow-y: auto;
    box-shadow: 2px 0 8px rgba(0,0,0,.08);
  }
  
  .sb-brand {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 28px;
  }
  
  .sb-brand .logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: white;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    overflow: hidden;
    border: 2px solid var(--gold-500);
  }

  .sb-brand .logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  
  .sb-brand .info {
    flex: 1;
    min-width: 0;
  }
  
  .sb-brand .name {
    color: white;
    font-weight: 700;
    font-size: 14px;
    line-height: 1.2;
  }
  
  .sb-brand .sub {
    font-size: 11px;
    color: rgba(255,255,255,.55);
    line-height: 1.2;
  }
  
  .sb-section {
    font-size: 10.5px;
    letter-spacing: .14em;
    color: rgba(255,255,255,.4);
    text-transform: uppercase;
    margin: 18px 8px 8px;
    font-weight: 600;
  }
  
  .sb-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
  }
  
  .sb-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #cbd5e1;
    transition: all .2s ease;
    text-decoration: none;
    border-left: 3px solid transparent;
  }
  
  .sb-item:hover {
    background: rgba(255,255,255,.08);
    color: white;
  }
  
  .sb-item.active {
    background: rgba(255,255,255,.12);
    color: white;
    border-left-color: var(--gold-500);
    padding-left: 9px;
  }
  
  .sb-item .ic {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    opacity: .7;
  }
  
  .sb-spacer {
    flex: 1;
  }
  
  .sb-user {
    border-top: 1px solid rgba(255,255,255,.08);
    padding-top: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  
  .sb-user .av {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--gold-500);
    color: var(--navy-700);
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  
  .sb-user .info {
    flex: 1;
    min-width: 0;
  }
  
  .sb-user .nm {
    color: white;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.2;
  }
  
  .sb-user .rl {
    font-size: 10.5px;
    color: rgba(255,255,255,.5);
    line-height: 1.2;
  }
  
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .topbar {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--ink-100);
    background: white;
    gap: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  
  .topbar .breadcrumb {
    font-size: 12px;
    color: var(--ink-500);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  
  .topbar .breadcrumb span {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  
  .topbar .breadcrumb span::before {
    content: '/';
    color: var(--ink-300);
  }
  
  .topbar .breadcrumb span:first-child::before {
    content: none;
  }
  
  .topbar h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink-900);
  }
  
  .topbar .grow {
    flex: 1;
  }
  
  .content {
    flex: 1;
    padding: 28px 32px;
    overflow-y: auto;
    background: var(--paper);
  }
  
  /* Scrollbar styling */
  .sidebar::-webkit-scrollbar,
  .content::-webkit-scrollbar {
    width: 6px;
  }

  .sidebar::-webkit-scrollbar-track,
  .content::-webkit-scrollbar-track {
    background: transparent;
  }

  .sidebar::-webkit-scrollbar-thumb,
  .content::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,.2);
    border-radius: 3px;
  }

  .sidebar::-webkit-scrollbar-thumb:hover,
  .content::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,.3);
  }

  /* ── DB Connection Status ── */
  .db-status {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid;
    white-space: nowrap;
    transition: all .3s;
  }
  .db-status.mock    { background: #fef3c7; color: #92400e; border-color: #fde68a; }
  .db-status.online  { background: #dcfce7; color: #14532d; border-color: #86efac; }
  .db-status.error   { background: #fee2e2; color: #7f1d1d; border-color: #fca5a5; }
  .db-status.loading { background: var(--ink-50); color: var(--ink-500); border-color: var(--ink-200); }

  .db-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .db-status.mock .db-dot    { background: #f59e0b; }
  .db-status.online .db-dot  { background: #22c55e; animation: pulse-dot 2s infinite; }
  .db-status.error .db-dot   { background: #ef4444; }
  .db-status.loading .db-dot { background: var(--ink-400); }

  @keyframes pulse-dot {
    0%,100% { opacity: 1; }
    50%      { opacity: .35; }
  }

  /* ── Mobile sidebar toggle ── */
  .menu-toggle {
    display: none;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    color: var(--ink-700);
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .menu-toggle:hover { background: var(--ink-100); }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 90;
  }
  .sidebar-overlay.open { display: block; }

  /* ── Responsive breakpoints ── */
  @media (max-width: 900px) {
    .app-frame { grid-template-columns: 200px 1fr; }
    .content { padding: 20px; }
  }

  @media (max-width: 768px) {
    .app-frame { grid-template-columns: 1fr; }

    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 268px;
      z-index: 100;
      transform: translateX(-100%);
      transition: transform .25s ease;
      padding: 16px 12px;
    }
    .sidebar.open { transform: translateX(0); }

    .menu-toggle { display: flex; }
    .topbar { padding: 12px 16px; }
    .content { padding: 16px; }

    .db-status { display: none; }
  }

  @media (max-width: 480px) {
    .content { padding: 12px; }
    .topbar .breadcrumb { display: none; }
  }

  /* ── Responsive utilities for child pages ── */
  @media (max-width: 768px) {
    /* Override fixed stat-grid columns from sub-pages */
    .stat-grid { grid-template-columns: repeat(2, 1fr) !important; }
    /* Settings tabs wrap */
    .set-tabs { flex-wrap: wrap; }
    .set-tab  { flex: 0 0 calc(50% - 4px); }
    /* Settings grid */
    .set-grid.cols-3 { grid-template-columns: 1fr 1fr !important; }
    /* Auth grid */
    .auth-grid { grid-template-columns: 1fr !important; }
    /* Row grid in dashboard */
    .row-grid { grid-template-columns: 1fr !important; }
    /* Disbursement form */
    form[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
    /* Tables — allow horizontal scroll */
    .proj-table-wrap, .user-table, .div-table { overflow-x: auto; display: block; }
  }

  @media (max-width: 480px) {
    .stat-grid { grid-template-columns: 1fr !important; }
    .set-grid { grid-template-columns: 1fr !important; }
    .set-tab  { flex: 0 0 100%; }
  }
</style>
</head>

<script>
// ── Auth ───────────────────────────────────────────────────
function checkAuth() {
  try {
    // Integrity check first — detects if plan_user was edited via DevTools
    if (typeof Security !== 'undefined' && !Security.enforce('signin.html')) return null;
    const raw = localStorage.getItem('plan_user');
    if (!raw) { window.location.href = 'signin.html'; return null; }
    const u = JSON.parse(raw);
    if (!u || !u.email) { window.location.href = 'signin.html'; return null; }
    return u;
  } catch {
    window.location.href = 'signin.html';
    return null;
  }
}

function logout() {
  if (confirm('คุณแน่ใจหรือว่าต้องการออกจากระบบ?')) {
    API.auth.logout();
    window.location.href = 'signin.html';
  }
}

// ── Session init ───────────────────────────────────────────
const currentUser = checkAuth();
if (currentUser) {
  const displayName = currentUser.display_name || currentUser.name || currentUser.email || '?';
  const initials    = displayName.charAt(0).toUpperCase();
  const roleLabels  = { admin: 'ผู้ดูแลระบบ', officer: 'เจ้าหน้าที่', viewer: 'ผู้ใช้' };

  document.getElementById('sb-av').textContent   = initials;
  document.getElementById('sb-name').textContent = displayName;
  document.getElementById('sb-role').textContent = roleLabels[currentUser.role] || currentUser.role || 'Staff';

  // Show Settings menu only for admin
  if (currentUser.role === 'admin') {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
  }

  // Expose globally so page scripts can access
  window.__currentUser = currentUser;
}

// ── Routing ────────────────────────────────────────────────
const pages = {
  dashboard:        'pages/dashboard.html',
  projects:         'pages/projects.html',
  'budget-estimate':'pages/budget-estimate.html',
  'allocation-list':'pages/allocation-list.html',
  'budget-received':'pages/budget-received.html',
  'budget-allocate':'pages/budget-allocate.html',
  budget:           'pages/budget.html',
  disbursement:     'pages/disbursement.html',
  approval:         'pages/approval.html',
  reports:          'pages/reports.html',
  settings:         'pages/settings.html'
};

const labels = {
  dashboard:        'Dashboard',
  projects:         'ทะเบียนโครงการ',
  'budget-estimate':'ประมาณการรายจ่าย',
  'allocation-list':'รายการจัดสรร',
  'budget-received':'งปม.เข้า',
  'budget-allocate':'จัดสรร งปม.',
  budget:           'บัญชีคุมงบ',
  disbursement:     'ขอเบิก',
  approval:         'กล่องอนุมัติ',
  reports:          'รายงาน',
  settings:         'ตั้งค่าระบบ'
};

const contentDiv  = document.getElementById('app-content');
const topbarTitle = document.getElementById('topbar-title');
let _activePage   = null;
const _pageCache  = {};

function _injectPage(html) {
  contentDiv.innerHTML = html;
  // innerHTML does NOT execute <script> tags — re-create them so they run
  contentDiv.querySelectorAll('script').forEach(old => {
    const s = document.createElement('script');
    [...old.attributes].forEach(a => s.setAttribute(a.name, a.value));
    s.textContent = old.textContent;
    old.parentNode.replaceChild(s, old);
  });
}

function loadPage(pageName) {
  const url = pages[pageName];
  if (!url) return;
  if (_activePage === pageName) return;

  _activePage = pageName;

  document.querySelectorAll('.sb-item').forEach(item => {
    item.classList.toggle('active', item.dataset.page === pageName);
  });
  topbarTitle.textContent = labels[pageName] || pageName;

  // Serve from cache instantly
  if (_pageCache[pageName]) {
    _injectPage(_pageCache[pageName]);
    return;
  }

  contentDiv.innerHTML = `
    <div style="padding:40px;text-align:center;color:var(--ink-400)">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      </svg>
      <p style="margin-top:12px;font-size:13px">กำลังโหลด...</p>
    </div>`;

  fetch(url)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(html => { _pageCache[pageName] = html; _injectPage(html); })
    .catch(() => {
      _activePage = null;
      contentDiv.innerHTML = `
        <div class="callout rose" style="max-width:500px;margin:40px auto">
          <strong>ไม่สามารถโหลดหน้านี้ได้</strong><br>
          <span style="font-size:12px;opacity:.7">${pageName} — ยังไม่ได้สร้างหน้านี้</span>
        </div>`;
    });
}

// ── Navigation ─────────────────────────────────────────────
document.querySelectorAll('.sb-item').forEach(item => {
  item.addEventListener('click', e => {
    e.preventDefault();
    closeSidebar();
    loadPage(item.dataset.page);
  });
});

// ── Mobile sidebar ──────────────────────────────────────────
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ── DB Connection Status ────────────────────────────────────
async function checkDbStatus() {
  const el     = document.getElementById('dbStatus');
  const textEl = document.getElementById('dbStatusText');
  const GAS_URL = window.__GAS_URL__;

  if (!GAS_URL) {
    el.className = 'db-status mock';
    textEl.textContent = 'Demo (MockDB)';
    return;
  }

  el.className = 'db-status loading';
  textEl.textContent = 'กำลังตรวจสอบ...';

  try {
    const ctrl = new AbortController();
    const tid  = setTimeout(() => ctrl.abort(), 9000);
    const resp = await fetch(`${GAS_URL}?action=ping`, { signal: ctrl.signal });
    clearTimeout(tid);
    if (resp.ok) {
      el.className = 'db-status online';
      textEl.textContent = 'เชื่อมต่อ GAS แล้ว';
    } else {
      el.className = 'db-status error';
      textEl.textContent = 'GAS: ' + resp.status;
    }
  } catch (err) {
    el.className = 'db-status error';
    textEl.textContent = err.name === 'AbortError' ? 'GAS: หมดเวลา' : 'เชื่อมต่อไม่ได้';
  }
}

// ── Spinner keyframe ───────────────────────────────────────
const _styleEl = document.createElement('style');
_styleEl.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(_styleEl);

// ── Start ──────────────────────────────────────────────────
checkDbStatus();
loadPage('dashboard');
</script>
