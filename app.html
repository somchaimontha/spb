<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>ระบบงานแผน · วก.แม่สะเรียง</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="logo-msr.png">
<link rel="apple-touch-icon" href="logo-msr.png">
<link rel="stylesheet" href="styles.css">
<script src="js/api.js"></script>
<style>
  body { margin: 0; display: flex; min-height: 100vh; background: var(--paper); }
  
  .app-frame {
    display: grid;
    grid-template-columns: 240px 1fr;
    width: 100%;
    min-height: 100vh;
  }
  
  .sidebar {
    background: var(--navy-700);
    color: #cbd5e1;
    display: flex;
    flex-direction: column;
    padding: 20px 14px;
    border-right: 1px solid rgba(0,0,0,.1);
    overflow-y: auto;
    box-shadow: 2px 0 8px rgba(0,0,0,.08);
  }
  
  .sb-brand {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 28px;
  }
  
  .sb-brand .logo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: white;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    overflow: hidden;
    border: 2px solid var(--gold-500);
  }

  .sb-brand .logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  
  .sb-brand .info {
    flex: 1;
    min-width: 0;
  }
  
  .sb-brand .name {
    color: white;
    font-weight: 700;
    font-size: 14px;
    line-height: 1.2;
  }
  
  .sb-brand .sub {
    font-size: 11px;
    color: rgba(255,255,255,.55);
    line-height: 1.2;
  }
  
  .sb-section {
    font-size: 10.5px;
    letter-spacing: .14em;
    color: rgba(255,255,255,.4);
    text-transform: uppercase;
    margin: 18px 8px 8px;
    font-weight: 600;
  }
  
  .sb-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
  }
  
  .sb-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #cbd5e1;
    transition: all .2s ease;
    text-decoration: none;
    border-left: 3px solid transparent;
  }
  
  .sb-item:hover {
    background: rgba(255,255,255,.08);
    color: white;
  }
  
  .sb-item.active {
    background: rgba(255,255,255,.12);
    color: white;
    border-left-color: var(--gold-500);
    padding-left: 9px;
  }
  
  .sb-item .ic {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    opacity: .7;
  }
  
  .sb-spacer {
    flex: 1;
  }
  
  .sb-user {
    border-top: 1px solid rgba(255,255,255,.08);
    padding-top: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  
  .sb-user .av {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--gold-500);
    color: var(--navy-700);
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
  }
  
  .sb-user .info {
    flex: 1;
    min-width: 0;
  }
  
  .sb-user .nm {
    color: white;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.2;
  }
  
  .sb-user .rl {
    font-size: 10.5px;
    color: rgba(255,255,255,.5);
    line-height: 1.2;
  }
  
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .topbar {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--ink-100);
    background: white;
    gap: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  
  .topbar .breadcrumb {
    font-size: 12px;
    color: var(--ink-500);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  
  .topbar .breadcrumb span {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  
  .topbar .breadcrumb span::before {
    content: '/';
    color: var(--ink-300);
  }
  
  .topbar .breadcrumb span:first-child::before {
    content: none;
  }
  
  .topbar h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink-900);
  }
  
  .topbar .grow {
    flex: 1;
  }
  
  .content {
    flex: 1;
    padding: 28px 32px;
    overflow-y: auto;
    background: var(--paper);
  }
  
  /* Scrollbar styling */
  .sidebar::-webkit-scrollbar,
  .content::-webkit-scrollbar {
    width: 6px;
  }
  
  .sidebar::-webkit-scrollbar-track,
  .content::-webkit-scrollbar-track {
    background: transparent;
  }
  
  .sidebar::-webkit-scrollbar-thumb,
  .content::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,.2);
    border-radius: 3px;
  }
  
  .sidebar::-webkit-scrollbar-thumb:hover,
  .content::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,.3);
  }
</style>
</head>
<body>

<div class="app-frame">
  
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="logo"><img src="logo-msr.png" alt="วก.แม่สะเรียง"></div>
      <div class="info">
        <div class="name">แผนและงบ</div>
        <div class="sub">วก.แม่สะเรียง</div>
      </div>
    </div>
    
    <div class="sb-section">หลัก</div>
    <nav class="sb-nav">
      <a href="#" class="sb-item active" data-page="dashboard">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <a href="#" class="sb-item" data-page="projects">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 11l3 3L22 4"/><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>โครงการ</span>
      </a>
    </nav>
    
    <div class="sb-section">การบริหาร</div>
    <nav class="sb-nav">
      <a href="#" class="sb-item" data-page="budget">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="11" width="20" height="2"/><path d="M2 4h20v16a2 2 0 01-2 2H4a2 2 0 01-2-2V4z"/>
        </svg>
        <span>บัญชีคุมงบ</span>
      </a>
      <a href="#" class="sb-item" data-page="disbursement">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="12 1 12 23M17.2 4.2a2 2 0 010 2.83l-5.39 5.39a1 1 0 01-1.42 0L4.8 7a2 2 0 112.83-2.83l1.13 1.13 1.13-1.13a2 2 0 012.83 0z"/>
        </svg>
        <span>ขอเบิก</span>
      </a>
      <a href="#" class="sb-item" data-page="approval">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/>
        </svg>
        <span>อนุมัติ</span>
      </a>
    </nav>
    
    <div class="sb-section">อื่นๆ</div>
    <nav class="sb-nav">
      <a href="#" class="sb-item" data-page="reports">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>รายงาน</span>
      </a>
      <a href="#" class="sb-item admin-only" data-page="settings" style="display:none">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93a10 10 0 0 0-14.14 0M4.93 19.07a10 10 0 0 0 14.14 0"/>
          <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
        </svg>
        <span>ตั้งค่าระบบ</span>
      </a>
    </nav>
    
    <div class="sb-spacer"></div>
    
    <div class="sb-user">
      <div class="av" id="sb-av">?</div>
      <div class="info">
        <div class="nm" id="sb-name">—</div>
        <div class="rl" id="sb-role">—</div>
      </div>
    </div>
  </aside>
  
  <!-- Main content -->
  <div class="main">
    <header class="topbar">
      <div class="breadcrumb">
        <span>หน้าแรก</span>
        <span id="topbar-title">Dashboard</span>
      </div>
      <div class="grow"></div>
      <button class="btn sm ghost" onclick="logout(); return false;">ออกจากระบบ</button>
    </header>
    <div class="content" id="app-content">
      <!-- Content loaded here -->
    </div>
  </div>
  
</div>

<script>
// ── Auth ───────────────────────────────────────────────────
function checkAuth() {
  try {
    const raw = localStorage.getItem('user');
    if (!raw) { window.location.href = 'signin.html'; return null; }
    return JSON.parse(raw);
  } catch {
    window.location.href = 'signin.html';
    return null;
  }
}

function logout() {
  if (confirm('คุณแน่ใจหรือว่าต้องการออกจากระบบ?')) {
    localStorage.removeItem('user');
    localStorage.removeItem('session_token');
    window.location.href = 'signin.html';
  }
}

// ── Session init ───────────────────────────────────────────
const currentUser = checkAuth();
if (currentUser) {
  const initials = (currentUser.name || currentUser.email || '?').charAt(0).toUpperCase();
  const roleLabels = { admin: 'ผู้ดูแลระบบ', officer: 'เจ้าหน้าที่', viewer: 'ผู้ใช้' };

  document.getElementById('sb-av').textContent   = initials;
  document.getElementById('sb-name').textContent = currentUser.name || currentUser.email || '—';
  document.getElementById('sb-role').textContent = roleLabels[currentUser.role] || currentUser.role || 'Staff';

  // Show Settings menu only for admin
  if (currentUser.role === 'admin') {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
  }

  // Expose globally so page scripts can access
  window.__currentUser = currentUser;
}

// ── Routing ────────────────────────────────────────────────
const pages = {
  dashboard:   'pages/dashboard.html',
  projects:    'pages/projects.html',
  budget:      'pages/budget.html',
  disbursement:'pages/disbursement.html',
  approval:    'pages/approval.html',
  reports:     'pages/reports.html',
  settings:    'pages/settings.html'
};

const labels = {
  dashboard:    'Dashboard',
  projects:     'ทะเบียนโครงการ',
  budget:       'บัญชีคุมงบ',
  disbursement: 'ขอเบิก',
  approval:     'กล่องอนุมัติ',
  reports:      'รายงาน',
  settings:     'ตั้งค่าระบบ'
};

const contentDiv   = document.getElementById('app-content');
const topbarTitle  = document.getElementById('topbar-title');
let _activePage    = null;

function loadPage(pageName) {
  const url = pages[pageName];
  if (!url) return;
  if (_activePage === pageName) return; // prevent double-load

  _activePage = pageName;

  // Update sidebar active state immediately (better UX)
  document.querySelectorAll('.sb-item').forEach(item => {
    item.classList.toggle('active', item.dataset.page === pageName);
  });
  topbarTitle.textContent = labels[pageName] || pageName;

  // Loading skeleton
  contentDiv.innerHTML = `
    <div style="padding:40px;text-align:center;color:var(--ink-400)">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      </svg>
      <p style="margin-top:12px;font-size:13px">กำลังโหลด...</p>
    </div>`;

  fetch(url)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(html => { contentDiv.innerHTML = html; })
    .catch(() => {
      _activePage = null;
      contentDiv.innerHTML = `
        <div class="callout rose" style="max-width:500px;margin:40px auto">
          <strong>ไม่สามารถโหลดหน้านี้ได้</strong><br>
          <span style="font-size:12px;opacity:.7">${pageName} — ยังไม่ได้สร้างหน้านี้</span>
        </div>`;
    });
}

// ── Navigation handler ─────────────────────────────────────
document.querySelectorAll('.sb-item').forEach(item => {
  item.addEventListener('click', e => {
    e.preventDefault();
    loadPage(item.dataset.page);
  });
});

// ── Spinner keyframe ───────────────────────────────────────
const styleEl = document.createElement('style');
styleEl.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(styleEl);

// ── Start ──────────────────────────────────────────────────
loadPage('dashboard');
</script>

</body>
</html>
