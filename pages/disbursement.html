<div>
  <div style="margin-bottom: 20px;">
    <div class="stat-grid" style="grid-template-columns: repeat(4, 1fr);">
      <div class="stat">
        <div class="lbl">ร่างขอเบิก</div>
        <div class="val">3</div>
        <div class="delta">พร้อมส่ง</div>
      </div>
      <div class="stat">
        <div class="lbl">รอตรวจสอบ</div>
        <div class="val">5</div>
        <div class="delta">วันนี้</div>
      </div>
      <div class="stat">
        <div class="lbl">อนุมัติแล้ว</div>
        <div class="val">42</div>
        <div class="delta">ประจำเดือน</div>
      </div>
      <div class="stat">
        <div class="lbl">รับเงินแล้ว</div>
        <div class="val">38</div>
        <div class="delta">เบิกใช้ไป</div>
      </div>
    </div>
  </div>
  
  <div class="panel">
    <h3>ฟอร์มขอเบิก</h3>
    <form style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;">
      <div class="field">
        <label style="font-size: 11.5px; color: var(--ink-500); letter-spacing: .04em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px;">เลือกโครงการ</label>
        <select style="padding: 10px 12px; border: 1px solid var(--ink-200); border-radius: 6px; font-size: 14px; font-family: inherit;">
          <option>-- เลือกโครงการ --</option>
          <option>101 - โครงการปรับปรุงห้องบริหาร</option>
          <option>102 - ครุภัณฑ์โต๊ะ chair ปี 2569</option>
          <option>201 - วัสดุการเรียนสาขาคอมพิวเตอร์</option>
        </select>
      </div>
      
      <div class="field">
        <label style="font-size: 11.5px; color: var(--ink-500); letter-spacing: .04em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px;">ประเภทเงิน</label>
        <select style="padding: 10px 12px; border: 1px solid var(--ink-200); border-radius: 6px; font-size: 14px; font-family: inherit;">
          <option>งบประมาณประจำปี</option>
          <option>งบอุดหนุน</option>
          <option>งบประมาณสารองจ่าย</option>
        </select>
      </div>
      
      <div class="field">
        <label style="font-size: 11.5px; color: var(--ink-500); letter-spacing: .04em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px;">จำนวนเงิน</label>
        <input type="number" placeholder="0.00" style="padding: 10px 12px; border: 1px solid var(--ink-200); border-radius: 6px; font-size: 14px; font-family: inherit;">
      </div>
      
      <div class="field">
        <label style="font-size: 11.5px; color: var(--ink-500); letter-spacing: .04em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px;">วัตถุประสงค์</label>
        <input type="text" placeholder="ระบุการเบิกจ่าย" style="padding: 10px 12px; border: 1px solid var(--ink-200); border-radius: 6px; font-size: 14px; font-family: inherit;">
      </div>
      
      <div class="field" style="grid-column: 1 / -1;">
        <label style="font-size: 11.5px; color: var(--ink-500); letter-spacing: .04em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px;">หมายเหตุ</label>
        <textarea placeholder="เพิ่มเติม..." style="padding: 10px 12px; border: 1px solid var(--ink-200); border-radius: 6px; font-size: 14px; font-family: inherit; height: 80px; resize: none;"></textarea>
      </div>
      
      <div class="field" style="grid-column: 1 / -1;">
        <label style="font-size: 11.5px; color: var(--ink-500); letter-spacing: .04em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px;">แนบไฟล์ (ใบเสร็จ/ใบสั่งซื้อ)</label>
        <div style="border: 2px dashed var(--ink-200); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: all .2s;">
          <div style="font-size: 28px; margin-bottom: 8px;">📎</div>
          <div style="font-size: 13px; color: var(--ink-600);">คลิกเพื่อแนบไฟล์หรือลาก</div>
          <div style="font-size: 11px; color: var(--ink-500); margin-top: 4px;">PDF, JPG, PNG (สูงสุด 5 MB)</div>
        </div>
      </div>
      
      <div style="grid-column: 1 / -1; display: flex; gap: 10px; margin-top: 10px;">
        <button type="button" style="flex: 1; padding: 10px; background: var(--ink-50); border: 1px solid var(--ink-200); border-radius: 6px; cursor: pointer; font-weight: 600; transition: all .2s;">บันทึกร่าง</button>
        <button type="button" style="flex: 1; padding: 10px; background: var(--navy-700); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all .2s;">ส่งขอเบิก</button>
      </div>
    </form>
  </div>
  
  <style>
    .field {
      display: flex;
      flex-direction: column;
    }
    
    .stat-grid {
      display: grid;
      gap: 12px;
    }
    
    .stat {
      background: white;
      border: 1px solid var(--ink-100);
      border-radius: var(--radius);
      padding: 16px 18px;
    }
    
    .stat .lbl {
      font-size: 11.5px;
      color: var(--ink-500);
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 600;
    }
    
    .stat .val {
      font-size: 26px;
      font-weight: 800;
      margin: 6px 0 4px;
      font-variant-numeric: tabular-nums;
    }
    
    .panel {
      background: white;
      border: 1px solid var(--ink-100);
      border-radius: var(--radius);
      padding: 22px;
    }
    
    .panel h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }
  </style>
</div>
